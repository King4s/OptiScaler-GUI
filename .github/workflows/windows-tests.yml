name: Windows Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Initialize test environment
        shell: pwsh
        run: .\setup_test_env.ps1

      - name: Run tests
        id: run-tests
        shell: pwsh
        run: |
          # Ensure outputs dir exists
          New-Item -ItemType Directory -Force -Path test_env\outputs | Out-Null
          # Run pytest and capture exit code and junit xml
          python -m pytest -q tests --junitxml=test_env\outputs\junit.xml
          $LASTEXITCODE | Out-File -FilePath test_env\outputs\exit_code.txt -Encoding utf8
        continue-on-error: true

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_env/outputs

      - name: Fail if tests failed
        if: always()
        shell: pwsh
        run: |
          $code = 0
          if (Test-Path test_env\outputs\exit_code.txt) {
            $code = [int](Get-Content test_env\outputs\exit_code.txt)
          }
          if ($code -ne 0) {
            Write-Error "Tests failed with exit code $code"
            exit $code
          }
